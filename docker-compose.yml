# Local development: database only.
# Run the backend directly on your machine (no Docker needed for the API):
#   cd backend && SPRING_PROFILES_ACTIVE=local ./gradlew bootRun

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: teacher_videos
      POSTGRES_USER: teacher
      POSTGRES_PASSWORD: teacher
    ports:
      - "5432:5432"
    volumes:
      - teacher_db:/var/lib/postgresql/data
      - ./backend/docker/init:/docker-entrypoint-initdb.d

volumes:
  teacher_db:
