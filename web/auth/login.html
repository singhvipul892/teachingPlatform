<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Singh Sir Maths Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a56db;
      --primary-dark: #1448be;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --error: #dc2626;
      --success: #16a34a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--primary);
      color: white;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      height: 56px;
      z-index: 100;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }

    body {
      padding-top: 56px;
    }

    /* ── Main Content ── */
    main {
      width: 100%;
      max-width: 400px;
    }

    /* ── Screens ── */
    .screen { display: none; padding: 2rem 1.5rem; }
    .screen.active { display: block; }

    /* ── Auth Card ── */
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem 1.5rem;
    }
    .auth-card h2 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
      color: var(--muted);
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Messages ── */
    .msg {
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }
    .msg.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }
    .msg.success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    /* ── Auth Switch ── */
    .auth-switch {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .auth-switch a {
      color: var(--primary);
      cursor: pointer;
      text-decoration: underline;
    }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .site-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>📚 Singh Sir — SSC CGL Maths</h1>
</header>

<main>
  <!-- ── Login Screen ── -->
  <div id="screen-login" class="screen active">
    <div class="auth-card">
      <h2>Sign In</h2>
      <div id="login-msg"></div>
      <div class="form-group">
        <label>Email or Mobile</label>
        <input id="login-identifier" type="text" placeholder="you@email.com or 9876543210" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="btn-login">Sign In</button>
      <div class="auth-switch">
        Don't have an account? <a onclick="showScreen('screen-signup')">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- ── Signup Screen ── -->
  <div id="screen-signup" class="screen">
    <div class="auth-card">
      <h2>Create Account</h2>
      <div id="signup-msg"></div>
      <div class="form-group">
        <label>First Name</label>
        <input id="signup-first" type="text" placeholder="Rahul" />
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input id="signup-last" type="text" placeholder="Sharma" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input id="signup-mobile" type="tel" placeholder="9876543210" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="signup-password" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="btn-signup">Create Account</button>
      <div class="auth-switch">
        Already have an account? <a onclick="showScreen('screen-login')">Sign In</a>
      </div>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    &copy; 2026 Singh Sir &nbsp;·&nbsp;
    <a href="/policies.html">Terms &amp; Conditions</a> &nbsp;·&nbsp;
    <a href="/policies.html?tab=privacy">Privacy Policy</a> &nbsp;·&nbsp;
    <a href="/policies.html?tab=refund">Refund Policy</a>
  </footer>
</main>

<!-- API Base URL -->
<script>const API_BASE = '';</script>
<!-- Auth Library -->
<script src="/web/lib/auth.js"></script>
<!-- Router Library -->
<script src="/web/lib/router.js"></script>

<script>
  // ── UI Helpers ──────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showMsg(elementId, text, type) {
    const el = document.getElementById(elementId);
    el.innerHTML = `<div class="msg ${type}">${text}</div>`;
  }

  function clearMsg(elementId) {
    document.getElementById(elementId).innerHTML = '';
  }

  // ── Login Handler ──────────────────────────────────────────
  document.getElementById('btn-login').addEventListener('click', async () => {
    clearMsg('login-msg');
    const username = document.getElementById('login-identifier').value.trim();
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
      return showMsg('login-msg', 'Please fill in all fields.', 'error');
    }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const response = await loginUser(username, password);

      // Redirect based on role
      if (response.role === 'ADMIN') {
        window.location.href = '/web/admin/index.html';
      } else {
        window.location.href = '/web/student/index.html';
      }
    } catch (error) {
      showMsg('login-msg', error.message || 'Login failed. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // ── Signup Handler ──────────────────────────────────────────
  document.getElementById('btn-signup').addEventListener('click', async () => {
    clearMsg('signup-msg');
    const firstName = document.getElementById('signup-first').value.trim();
    const lastName = document.getElementById('signup-last').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const mobileNumber = document.getElementById('signup-mobile').value.trim();
    const password = document.getElementById('signup-password').value;

    if (!firstName || !lastName || !email || !mobileNumber || !password) {
      return showMsg('signup-msg', 'Please fill in all fields.', 'error');
    }

    const btn = document.getElementById('btn-signup');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const response = await signupUser(firstName, lastName, email, mobileNumber, password);

      // Redirect based on role (new users are USER role by default)
      if (response.role === 'ADMIN') {
        window.location.href = '/web/admin/index.html';
      } else {
        window.location.href = '/web/student/index.html';
      }
    } catch (error) {
      showMsg('signup-msg', error.message || 'Signup failed. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>

</body>
</html>
