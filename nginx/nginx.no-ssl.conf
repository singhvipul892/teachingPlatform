# Use this config when SSL certs are not yet available (local dev or first-time setup).
# For production with HTTPS, use nginx.conf and mount Let's Encrypt certs.

server {
    listen 80;
    server_name teacherplatform.duckdns.org localhost;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /web/lib/ {
        alias /usr/share/nginx/html/web/lib/;
    }

    # Student web page — served as static files
    location = /student {
        return 301 /student/;
    }
    location /student/ {
        alias /usr/share/nginx/html/student/;
        index index.html;
    }

    # Admin dashboard — served as static files (restricted access)
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
    }

    location / {
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
