server {
    listen 80;
    server_name teacherplatform.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name teacherplatform.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/teacherplatform.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teacherplatform.duckdns.org/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Global limit for all requests (prevents 413 errors on large uploads)
    client_max_body_size 100m;

    # Redirect root to login page
    location = / {
        return 302 /web/auth/login.html;
    }

    # Fix broken absolute policy links from login.html
    location = /policies.html {
        return 301 /web/student/policies.html;
    }

    # All web static files (admin, student, auth pages, shared libs)
    location /web/ {
        client_max_body_size 100m;
        alias /usr/share/nginx/html/web/;
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        client_max_body_size 100m;
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Buffer settings for large uploads
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
